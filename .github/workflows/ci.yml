name: tests

# Run on pushes to main and on every pull request. The GPU-free suite mocks ComfyUI, so it runs
# on a clean runner with no models, no GPU, no server.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Developed on Windows; Linux proves the "anyone can fork this" promise.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (editable + dev tooling)
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff — correctness rules)
        run: ruff check .
      - name: Run tests
        run: python -m pytest
      - name: CLI entry point smoke
        run: chimera --help
